<article class="article-wrapper" [ngClass]="{ 'no-animation': isAnimationFinished }">
    <mat-card [ngClass]="{ 'blog-article': true, 'no-animation': true }">
        <mat-card-header>
            <mat-card-title class="mat-headline no-animation">
                {{ article.translations[0].header }}
                <span class="meta">Date updated:&nbsp; {{ article.updatedAt?.toDate() | date: 'dd MM yyyy' }}</span>
            </mat-card-title>
            <!-- <mat-card-subtitle class="mat-title"> Some article subtitle </mat-card-subtitle> -->
        </mat-card-header>
        <mat-card-content [ngClass]="{ preview: isPreview }" *ngIf="article.translations[0].content">
            <app-block-parser [data]="article.translations[0].content"></app-block-parser>
        </mat-card-content>
        <mat-card-actions>
            <!-- TODO: fix the link - it should point to the article -->
            <button mat-fab extended [routerLink]="['/blog', 'article', article.id]" class="success action-btn">
                Go to Article
            </button>
        </mat-card-actions>
    </mat-card>
    <div>Article ID: {{ id }}</div>
</article>
